<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Triviauto QR Remote</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        padding: 16px;
        background: #101114;
        color: #fff;
      }
      .panel {
        max-width: 520px;
        margin: 0 auto;
        display: grid;
        gap: 12px;
      }
      .status {
        font-size: 14px;
        color: #b8bec9;
      }
      .scores {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .score {
        background: #1a1c22;
        border: 1px solid #2a2d36;
        border-radius: 10px;
        padding: 12px;
      }
      .score-name {
        font-size: 13px;
        color: #9da6b6;
      }
      .score-value {
        font-size: 34px;
        font-weight: 800;
        margin-top: 6px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      button {
        min-height: 76px;
        border-radius: 12px;
        border: none;
        font-size: 30px;
        font-weight: 800;
        background: #2f74ff;
        color: #fff;
      }
      button.secondary {
        font-size: 18px;
        min-height: 56px;
        background: #3a4250;
      }
      button:disabled {
        opacity: 0.45;
      }
      .footer {
        font-size: 12px;
        color: #80889a;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div id="status" class="status">Connecting...</div>
      <div class="scores">
        <div class="score">
          <div id="p1-name" class="score-name">Player 1</div>
          <div id="p1-score" class="score-value">0</div>
        </div>
        <div class="score">
          <div id="p2-name" class="score-name">Player 2</div>
          <div id="p2-score" class="score-value">0</div>
        </div>
      </div>

      <div class="grid">
        <button data-action="inc_p1">P1 +</button>
        <button data-action="inc_p2">P2 +</button>
        <button data-action="dec_p1">P1 -</button>
        <button data-action="dec_p2">P2 -</button>
      </div>
      <button id="play-again" class="secondary" data-action="play_again" disabled>
        Play Again
      </button>
      <div id="session" class="footer"></div>
    </div>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      // Replace these with your real project values.
      const SUPABASE_URL = 'https://sinxnvyfdtskacnckokz.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_wO9FIly9LdwFQ9U4TBJqzw_XVWlCySd';

      const statusEl = document.getElementById('status');
      const sessionEl = document.getElementById('session');
      const p1NameEl = document.getElementById('p1-name');
      const p2NameEl = document.getElementById('p2-name');
      const p1ScoreEl = document.getElementById('p1-score');
      const p2ScoreEl = document.getElementById('p2-score');
      const playAgainBtn = document.getElementById('play-again');
      const commandButtons = Array.from(document.querySelectorAll('button[data-action]'));

      const params = new URLSearchParams(window.location.search);
      const session = params.get('session');

      if (!session) {
        statusEl.textContent = 'Missing session in URL.';
        commandButtons.forEach((btn) => (btn.disabled = true));
        throw new Error('Missing session query parameter');
      }

      sessionEl.textContent = `Session: ${session}`;
      const channelName = `trivia_session_${session}`;
      const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false },
      });

      let lastTap = 0;
      const sendCommand = async (action) => {
        const now = Date.now();
        if (now - lastTap < 120) return;
        lastTap = now;
        await channel.send({
          type: 'broadcast',
          event: 'score_remote_command',
          payload: { action, source: 'remote_web' },
        });
      };

      const channel = client
        .channel(channelName, { config: { broadcast: { self: false } } })
        .on('broadcast', { event: 'score_state' }, ({ payload }) => {
          p1NameEl.textContent = payload.player1Name || 'Player 1';
          p2NameEl.textContent = payload.player2Name || 'Player 2';
          p1ScoreEl.textContent = String(payload.score1 ?? 0);
          p2ScoreEl.textContent = String(payload.score2 ?? 0);
          playAgainBtn.disabled = !payload.canPlayAgain;
        });

      channel.subscribe((status) => {
        if (status === 'SUBSCRIBED') statusEl.textContent = 'Connected';
        else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT')
          statusEl.textContent = 'Disconnected';
        else if (status === 'CLOSED') statusEl.textContent = 'Offline';
        else statusEl.textContent = `Status: ${status}`;
      });

      commandButtons.forEach((button) => {
        button.addEventListener('click', () => {
          sendCommand(button.dataset.action);
          if (navigator.vibrate) navigator.vibrate(20);
        });
      });
    </script>
  </body>
</html>
