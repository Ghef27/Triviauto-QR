<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Triviauto Remote</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        --bg: #0c0c0e;
        --surface: #1b1b1f;
        --text: #ffffff;
        --text-muted: #b3b3b3;
        --online: #22c55e;
        --offline: #e74c3c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        padding: 16px;
        padding-bottom: calc(16px + env(safe-area-inset-bottom));
      }

      .app {
        max-width: 520px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 4px;
      }

      .status-label {
        font-size: 14px;
        color: var(--text-muted);
        font-weight: 600;
      }

      .status-value {
        font-size: 14px;
        font-weight: 700;
      }

      .status-value.online {
        color: var(--online);
      }

      .status-value.offline {
        color: var(--offline);
      }

      .score-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .score-card {
        background: var(--surface);
        border-radius: 12px;
        padding: 16px;
        display: grid;
        gap: 8px;
        justify-items: center;
      }

      .score-name {
        font-size: 16px;
        font-weight: 600;
        text-align: center;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .score-controls {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .score-value {
        font-size: 24px;
        font-weight: 700;
        min-width: 32px;
        text-align: center;
      }

      .score-btn {
        width: 40px;
        height: 40px;
        border: none;
        padding: 0;
        background: transparent;
        background-image: url('./assets/emptysquare-button.png');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        color: #3d2314;
        font-size: 22px;
        font-weight: 900;
        line-height: 40px;
        cursor: pointer;
      }

      .score-btn:active {
        transform: scale(0.96);
      }

      .game-controls {
        display: flex;
        align-items: center;
        justify-content: space-evenly;
        gap: 8px;
        padding-top: 4px;
      }

      .icon-btn {
        width: 52px;
        height: 52px;
        border: none;
        padding: 0;
        background: transparent;
        cursor: pointer;
      }

      .icon-btn img {
        width: 52px;
        height: 52px;
        display: block;
      }

      .icon-btn:active:not(:disabled) {
        transform: scale(0.96);
      }

      .icon-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .play-again-wrap {
        display: flex;
        justify-content: center;
        padding-top: 8px;
      }

      .play-again-btn {
        border: none;
        padding: 0;
        width: 220px;
        height: auto;
        background: transparent;
        cursor: pointer;
      }

      .play-again-btn img {
        width: 100%;
        height: auto;
        display: block;
      }

      .play-again-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="status-row">
        <span class="status-label">Connection</span>
        <span id="status" class="status-value offline">Connecting...</span>
      </div>

      <div class="score-row">
        <div class="score-card">
          <div id="p1-name" class="score-name">Player 1</div>
          <div class="score-controls">
            <button class="score-btn" data-action="dec_p1" aria-label="Player 1 minus">-</button>
            <div id="p1-score" class="score-value">0</div>
            <button class="score-btn" data-action="inc_p1" aria-label="Player 1 plus">+</button>
          </div>
        </div>
        <div class="score-card">
          <div id="p2-name" class="score-name">Player 2</div>
          <div class="score-controls">
            <button class="score-btn" data-action="dec_p2" aria-label="Player 2 minus">-</button>
            <div id="p2-score" class="score-value">0</div>
            <button class="score-btn" data-action="inc_p2" aria-label="Player 2 plus">+</button>
          </div>
        </div>
      </div>

      <div class="game-controls">
        <button id="pause-btn" class="icon-btn" data-action="pause_or_resume" aria-label="Pause">
          <img id="pause-icon" src="./assets/pause-circle.png" alt="" />
        </button>
        <button id="stop-btn" class="icon-btn" data-action="end_game" aria-label="Stop">
          <img src="./assets/stop-circle.png" alt="" />
        </button>
        <button id="block-btn" class="icon-btn" data-action="block_question" aria-label="Block question">
          <img src="./assets/cross-circle.png" alt="" />
        </button>
      </div>

      <div class="play-again-wrap">
        <button id="play-again" class="play-again-btn" data-action="play_again" disabled aria-label="Play again">
          <img src="./assets/retry-button-hex.png" alt="Play again" />
        </button>
      </div>
    </div>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      const SUPABASE_URL = 'https://sinxnvyfdtskacnckokz.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_wO9FIly9LdwFQ9U4TBJqzw_XVWlCySd';

      const normalizeSessionId = (value) => String(value || '').trim().toUpperCase();

      const statusEl = document.getElementById('status');
      const p1NameEl = document.getElementById('p1-name');
      const p2NameEl = document.getElementById('p2-name');
      const p1ScoreEl = document.getElementById('p1-score');
      const p2ScoreEl = document.getElementById('p2-score');
      const pauseBtn = document.getElementById('pause-btn');
      const pauseIcon = document.getElementById('pause-icon');
      const stopBtn = document.getElementById('stop-btn');
      const blockBtn = document.getElementById('block-btn');
      const playAgainBtn = document.getElementById('play-again');
      const commandButtons = Array.from(document.querySelectorAll('[data-action]'));

      const params = new URLSearchParams(window.location.search);
      const session = normalizeSessionId(params.get('session'));

      const setStatus = (text, online) => {
        statusEl.textContent = text;
        statusEl.classList.toggle('online', online);
        statusEl.classList.toggle('offline', !online);
      };

      if (!session) {
        setStatus('Missing session in URL', false);
        commandButtons.forEach((btn) => {
          btn.disabled = true;
        });
        throw new Error('Missing session query parameter');
      }

      const channelName = `trivia_session_${session}`;
      const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false },
      });

      let lastTap = 0;
      let remoteState = {
        isPaused: false,
        canPause: false,
        canStop: false,
        canBlockQuestion: false,
        canPlayAgain: false,
      };

      const sendCommand = async (action) => {
        const now = Date.now();
        if (now - lastTap < 120) return;
        lastTap = now;
        await channel.send({
          type: 'broadcast',
          event: 'score_remote_command',
          payload: { action, source: 'remote_web' },
        });
      };

      const applyRemoteState = (payload = {}) => {
        p1NameEl.textContent = payload.player1Name || 'Player 1';
        p2NameEl.textContent = payload.player2Name || 'Player 2';
        p1ScoreEl.textContent = String(payload.score1 ?? 0);
        p2ScoreEl.textContent = String(payload.score2 ?? 0);

        remoteState = {
          isPaused: Boolean(payload.isPaused),
          canPause: Boolean(payload.canPause),
          canStop: Boolean(payload.canStop),
          canBlockQuestion: Boolean(payload.canBlockQuestion),
          canPlayAgain: Boolean(payload.canPlayAgain),
        };

        pauseBtn.disabled = !remoteState.canPause;
        stopBtn.disabled = !remoteState.canStop;
        blockBtn.disabled = !remoteState.canBlockQuestion;
        playAgainBtn.disabled = !remoteState.canPlayAgain;

        pauseIcon.src = remoteState.isPaused
          ? './assets/play-circle.png'
          : './assets/pause-circle.png';
        pauseBtn.setAttribute(
          'aria-label',
          remoteState.isPaused ? 'Resume' : 'Pause'
        );
      };

      const channel = client
        .channel(channelName, { config: { broadcast: { self: false } } })
        .on('broadcast', { event: 'score_state' }, ({ payload }) => {
          applyRemoteState(payload);
        });

      channel.subscribe((status) => {
        if (status === 'SUBSCRIBED') setStatus('Connected', true);
        else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') setStatus('Disconnected', false);
        else if (status === 'CLOSED') setStatus('Offline', false);
        else setStatus(`Status: ${status}`, false);
      });

      commandButtons.forEach((button) => {
        button.addEventListener('click', () => {
          sendCommand(button.dataset.action);
          if (navigator.vibrate) navigator.vibrate(20);
        });
      });
    </script>
  </body>
</html>
