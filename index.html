<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Triviauto Remote</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        --bg: #0c0c0e;
        --surface: #1b1b1f;
        --text: #ffffff;
        --text-muted: #b3b3b3;
        --subtitle: #c8c8c8;
        --timer-track: #2a2a2f;
        --timer-progress: #2ecc71;
        --online: #22c55e;
        --offline: #e74c3c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
      }

      .app-header {
        flex-shrink: 0;
        padding: 20px 16px 8px;
        text-align: center;
      }

      .app-logo {
        width: 80px;
        height: 80px;
        display: inline-block;
      }

      .app-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 16px;
        padding: 8px 16px 24px;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 4px;
      }

      .status-label {
        font-size: 14px;
        color: var(--text-muted);
        font-weight: 600;
      }

      .status-value {
        font-size: 14px;
        font-weight: 700;
      }

      .status-value.online {
        color: var(--online);
      }

      .status-value.offline {
        color: var(--offline);
      }

      .results-head {
        text-align: center;
        display: grid;
        gap: 4px;
      }

      .results-title {
        margin: 0;
        font-size: 32px;
        font-weight: 700;
        color: var(--text);
      }

      .results-subtitle {
        margin: 0 0 4px;
        font-size: 16px;
        color: var(--subtitle);
      }

      .score-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .score-card {
        background: var(--surface);
        border-radius: 12px;
        padding: 16px;
        display: grid;
        gap: 8px;
        justify-items: center;
      }

      .score-name {
        font-size: 16px;
        font-weight: 600;
        text-align: center;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .score-controls {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .score-value {
        font-size: 24px;
        font-weight: 700;
        min-width: 32px;
        text-align: center;
      }

      .score-btn {
        width: 40px;
        height: 40px;
        border: none;
        padding: 0;
        background: transparent;
        background-image: url('./assets/emptysquare-button.png');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        color: #3d2314;
        font-size: 22px;
        font-weight: 900;
        line-height: 40px;
        cursor: pointer;
      }

      .score-btn:active {
        transform: scale(0.96);
      }

      .win-badge {
        width: 48px;
        height: calc(48px * (106 / 146));
        margin-top: 4px;
      }

      .game-hud {
        display: grid;
        justify-items: center;
        gap: 10px;
        padding-top: 4px;
      }

      .round-label {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
      }

      .timer-wrap {
        position: relative;
        width: 64px;
        height: 64px;
      }

      .timer-svg {
        display: block;
      }

      .timer-label {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
        pointer-events: none;
      }

      .game-controls {
        display: flex;
        align-items: center;
        justify-content: space-evenly;
        gap: 8px;
        padding-top: 4px;
      }

      .icon-btn {
        width: 52px;
        height: 52px;
        border: none;
        padding: 0;
        background: transparent;
        cursor: pointer;
      }

      .icon-btn img {
        width: 52px;
        height: 52px;
        display: block;
      }

      .icon-btn:active:not(:disabled) {
        transform: scale(0.96);
      }

      .icon-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .play-again-wrap {
        display: flex;
        justify-content: center;
        padding-top: 8px;
      }

      .play-again-btn {
        border: none;
        padding: 0;
        width: 220px;
        background: transparent;
        cursor: pointer;
      }

      .play-again-bg {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 220px;
        aspect-ratio: 154 / 50;
        background: url('./assets/startgame-button.png') center / 100% 100% no-repeat;
      }

      .play-again-text {
        color: #ffffff;
        font-weight: 900;
        font-size: 16px;
        padding: 0 36px 0 12px;
        text-align: center;
        text-shadow:
          -1px -1px 0 #000,
          0 -1px 0 #000,
          1px -1px 0 #000,
          -1px 0 0 #000,
          1px 0 0 #000,
          -1px 1px 0 #000,
          0 1px 0 #000,
          1px 1px 0 #000;
      }

      .play-again-icon {
        position: absolute;
        right: -10px;
        width: 50px;
        height: 50px;
        pointer-events: none;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="app-header">
        <img src="./assets/icon.png" class="app-logo" alt="Triviauto" />
      </header>

      <main class="app-main">
        <div class="status-row">
          <span class="status-label">Connection</span>
          <span id="status" class="status-value offline">Connecting...</span>
        </div>

        <div id="results-head" class="results-head hidden">
          <h1 id="game-over-label" class="results-title">Game Over</h1>
          <p id="final-scores-label" class="results-subtitle">Final Scores</p>
        </div>

        <div class="score-row">
          <div class="score-card">
            <div id="p1-name" class="score-name">Player 1</div>
            <div class="score-controls">
              <button class="score-btn" data-action="dec_p1" aria-label="Player 1 minus">-</button>
              <div id="p1-score" class="score-value">0</div>
              <button class="score-btn" data-action="inc_p1" aria-label="Player 1 plus">+</button>
            </div>
            <img id="p1-win" class="win-badge hidden" src="./assets/win-badge.png" alt="Winner" />
          </div>
          <div class="score-card">
            <div id="p2-name" class="score-name">Player 2</div>
            <div class="score-controls">
              <button class="score-btn" data-action="dec_p2" aria-label="Player 2 minus">-</button>
              <div id="p2-score" class="score-value">0</div>
              <button class="score-btn" data-action="inc_p2" aria-label="Player 2 plus">+</button>
            </div>
            <img id="p2-win" class="win-badge hidden" src="./assets/win-badge.png" alt="Winner" />
          </div>
        </div>

        <div id="game-hud" class="game-hud hidden">
          <div id="round-label" class="round-label">Round 1 / 20</div>
          <div class="timer-wrap">
            <svg id="timer-svg" class="timer-svg" width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
              <circle cx="32" cy="32" r="29" stroke="var(--timer-track)" stroke-width="6" fill="transparent" />
              <circle
                id="timer-progress"
                cx="32"
                cy="32"
                r="29"
                stroke="var(--timer-progress)"
                stroke-width="6"
                fill="transparent"
                stroke-linecap="round"
                transform="rotate(-90 32 32)"
              />
            </svg>
            <span id="timer-label" class="timer-label">0</span>
          </div>
        </div>

        <div id="game-controls" class="game-controls">
          <button id="pause-btn" class="icon-btn" data-action="pause_or_resume" aria-label="Pause">
            <img id="pause-icon" src="./assets/pause-circle.png" alt="" />
          </button>
          <button id="stop-btn" class="icon-btn" data-action="end_game" aria-label="Stop">
            <img src="./assets/stop-circle.png" alt="" />
          </button>
          <button id="block-btn" class="icon-btn" data-action="block_question" aria-label="Block question">
            <img src="./assets/cross-circle.png" alt="" />
          </button>
        </div>

        <div id="play-again-wrap" class="play-again-wrap hidden">
          <button id="play-again" class="play-again-btn" data-action="play_again" aria-label="Play again">
            <span class="play-again-bg">
              <span id="play-again-text" class="play-again-text">Play Again</span>
              <img class="play-again-icon" src="./assets/retry-button-hex.png" alt="" />
            </span>
          </button>
        </div>
      </main>
    </div>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      const SUPABASE_URL = 'https://sinxnvyfdtskacnckokz.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_wO9FIly9LdwFQ9U4TBJqzw_XVWlCySd';

      const normalizeSessionId = (value) => String(value || '').trim().toUpperCase();

      const statusEl = document.getElementById('status');
      const resultsHeadEl = document.getElementById('results-head');
      const gameOverLabelEl = document.getElementById('game-over-label');
      const finalScoresLabelEl = document.getElementById('final-scores-label');
      const p1NameEl = document.getElementById('p1-name');
      const p2NameEl = document.getElementById('p2-name');
      const p1ScoreEl = document.getElementById('p1-score');
      const p2ScoreEl = document.getElementById('p2-score');
      const p1WinEl = document.getElementById('p1-win');
      const p2WinEl = document.getElementById('p2-win');
      const gameHudEl = document.getElementById('game-hud');
      const gameControlsEl = document.getElementById('game-controls');
      const roundLabelEl = document.getElementById('round-label');
      const timerProgressEl = document.getElementById('timer-progress');
      const timerLabelEl = document.getElementById('timer-label');
      const pauseBtn = document.getElementById('pause-btn');
      const pauseIcon = document.getElementById('pause-icon');
      const stopBtn = document.getElementById('stop-btn');
      const blockBtn = document.getElementById('block-btn');
      const playAgainWrap = document.getElementById('play-again-wrap');
      const playAgainTextEl = document.getElementById('play-again-text');
      const commandButtons = Array.from(document.querySelectorAll('[data-action]'));

      const TIMER_SIZE = 64;
      const TIMER_STROKE = 6;
      const TIMER_RADIUS = (TIMER_SIZE - TIMER_STROKE) / 2;
      const TIMER_CIRCUMFERENCE = 2 * Math.PI * TIMER_RADIUS;

      timerProgressEl.setAttribute('stroke-dasharray', `${TIMER_CIRCUMFERENCE} ${TIMER_CIRCUMFERENCE}`);
      timerProgressEl.setAttribute('stroke-dashoffset', String(TIMER_CIRCUMFERENCE));

      const params = new URLSearchParams(window.location.search);
      const session = normalizeSessionId(params.get('session'));

      const setStatus = (text, online) => {
        statusEl.textContent = text;
        statusEl.classList.toggle('online', online);
        statusEl.classList.toggle('offline', !online);
      };

      if (!session) {
        setStatus('Missing session in URL', false);
        commandButtons.forEach((btn) => {
          btn.disabled = true;
        });
        throw new Error('Missing session query parameter');
      }

      const channelName = `trivia_session_${session}`;
      const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false },
      });

      let lastTap = 0;
      let remoteState = {
        isPaused: false,
        canPause: false,
        canStop: false,
        canBlockQuestion: false,
        canPlayAgain: false,
      };

      const sendCommand = async (action) => {
        const now = Date.now();
        if (now - lastTap < 120) return;
        lastTap = now;
        await channel.send({
          type: 'broadcast',
          event: 'score_remote_command',
          payload: { action, source: 'remote_web' },
        });
      };

      const updateTimer = (payload = {}) => {
        const showHud = Boolean(payload.showGameHud);
        gameHudEl.classList.toggle('hidden', !showHud);
        if (!showHud) return;

        const roundWord = payload.appLanguage === 'ro' ? 'Runda' : 'Round';
        const currentRound = payload.currentRound ?? 1;
        const roundsTotal = payload.roundsTotal ?? 1;
        roundLabelEl.textContent = `${roundWord} ${currentRound} / ${roundsTotal}`;

        const paused = Boolean(payload.isPaused);
        const answerTime = payload.answerTimeSec || 10;
        const countdown = payload.countdownSec ?? 0;
        const progress =
          countdown > 0 && answerTime > 0 ? Math.max(0, Math.min(1, countdown / answerTime)) : 0;

        timerLabelEl.textContent = paused ? 'II' : String(countdown);
        timerProgressEl.setAttribute(
          'stroke-dashoffset',
          String(TIMER_CIRCUMFERENCE * (1 - progress))
        );
      };

      const applyRemoteState = (payload = {}) => {
        const isResults = payload.screen === 'results' || Boolean(payload.canPlayAgain);

        p1NameEl.textContent = payload.player1Name || 'Player 1';
        p2NameEl.textContent = payload.player2Name || 'Player 2';
        p1ScoreEl.textContent = String(payload.score1 ?? 0);
        p2ScoreEl.textContent = String(payload.score2 ?? 0);

        gameOverLabelEl.textContent = payload.gameOverLabel || 'Game Over';
        finalScoresLabelEl.textContent = payload.finalScoresLabel || 'Final Scores';
        playAgainTextEl.textContent = payload.playAgainLabel || 'Play Again';

        p1WinEl.classList.toggle('hidden', payload.winner !== 'p1');
        p2WinEl.classList.toggle('hidden', payload.winner !== 'p2');

        resultsHeadEl.classList.toggle('hidden', !isResults);
        gameControlsEl.classList.toggle('hidden', isResults);
        playAgainWrap.classList.toggle('hidden', !isResults);

        remoteState = {
          isPaused: Boolean(payload.isPaused),
          canPause: Boolean(payload.canPause),
          canStop: Boolean(payload.canStop),
          canBlockQuestion: Boolean(payload.canBlockQuestion),
          canPlayAgain: Boolean(payload.canPlayAgain),
        };

        pauseBtn.disabled = !remoteState.canPause;
        stopBtn.disabled = !remoteState.canStop;
        blockBtn.disabled = !remoteState.canBlockQuestion;

        pauseIcon.src = remoteState.isPaused
          ? './assets/play-circle.png'
          : './assets/pause-circle.png';
        pauseBtn.setAttribute('aria-label', remoteState.isPaused ? 'Resume' : 'Pause');

        updateTimer(payload);
      };

      const channel = client
        .channel(channelName, { config: { broadcast: { self: false } } })
        .on('broadcast', { event: 'score_state' }, ({ payload }) => {
          applyRemoteState(payload);
        });

      channel.subscribe((status) => {
        if (status === 'SUBSCRIBED') setStatus('Connected', true);
        else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') setStatus('Disconnected', false);
        else if (status === 'CLOSED') setStatus('Offline', false);
        else setStatus(`Status: ${status}`, false);
      });

      commandButtons.forEach((button) => {
        button.addEventListener('click', () => {
          sendCommand(button.dataset.action);
          if (navigator.vibrate) navigator.vibrate(20);
        });
      });
    </script>
  </body>
</html>
